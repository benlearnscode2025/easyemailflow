<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DESIGN REVIEW | Easy Email Flow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200..800&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; background: #f3f4f6; }
        #canvas-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1000;
            pointer-events: none;
        }
        #preview-frame {
            width: 100vw;
            height: 100vh;
            border: none;
            display: block;
        }
        .drawing-active #canvas-wrapper {
            pointer-events: auto;
        }
        .drawing-active #preview-frame {
            pointer-events: none;
        }
        .tool-btn-active {
            background-color: white !important;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05) !important;
            color: black !important;
        }
    </style>
</head>
<body class="overflow-hidden">
    <!-- Toolbar -->
    <div class="fixed top-6 left-1/2 -translate-x-1/2 z-[2000] flex items-center gap-4 bg-white/90 backdrop-blur-xl p-2 rounded-full shadow-2xl border border-black/5">
        <div class="px-4 py-2 border-r border-black/5 flex flex-col">
            <span class="text-[9px] font-bold uppercase tracking-widest text-teal-600">Review Mode</span>
            <span id="mode-text" class="text-[8px] font-bold text-gray-400 uppercase">Navigating</span>
        </div>
        
        <!-- Mode Toggles -->
        <div class="flex items-center gap-1 bg-gray-100 p-1 rounded-full">
            <button id="tool-nav" class="px-4 py-2 rounded-full font-bold text-[10px] uppercase transition-all tool-btn-active">Navigate</button>
            <button id="tool-draw" class="px-4 py-2 rounded-full font-bold text-[10px] uppercase transition-all text-gray-500 hover:text-black">Draw</button>
            <button id="tool-text" class="px-4 py-2 rounded-full font-bold text-[10px] uppercase transition-all text-gray-500 hover:text-black">Text</button>
            <button id="tool-select" class="px-4 py-2 rounded-full font-bold text-[10px] uppercase transition-all text-gray-500 hover:text-black">Select</button>
        </div>

        <!-- History Controls -->
        <div class="flex items-center gap-1 border-l border-black/5 pl-4">
            <button id="btn-undo" class="w-8 h-8 rounded-full flex items-center justify-center hover:bg-gray-100 text-gray-500 transition-colors disabled:opacity-30" title="Undo (Ctrl+Z)">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"></path></svg>
            </button>
            <button id="btn-redo" class="w-8 h-8 rounded-full flex items-center justify-center hover:bg-gray-100 text-gray-500 transition-colors disabled:opacity-30" title="Redo (Ctrl+Y)">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 10h-10a8 8 0 00-8 8v2m18-10l-6 6m6-6l-6-6"></path></svg>
            </button>
        </div>

        <button id="btn-clear" class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-red-50 text-red-500 transition-colors" title="Clear All">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
        </button>

        <a href="index.html" class="px-6 py-2 bg-black text-white rounded-full text-xs font-bold hover:scale-105 transition-transform">Done</a>
    </div>

    <!-- The Site -->
    <iframe id="preview-frame" src="index.html"></iframe>

    <!-- Overlay Canvas -->
    <div id="canvas-wrapper">
        <canvas id="markup-canvas"></canvas>
    </div>

    <script>
        const frame = document.getElementById('preview-frame');
        const wrapper = document.getElementById('canvas-wrapper');
        const modeText = document.getElementById('mode-text');
        
        const tools = {
            nav: document.getElementById('tool-nav'),
            draw: document.getElementById('tool-draw'),
            text: document.getElementById('tool-text'),
            select: document.getElementById('tool-select')
        };
        
        const historyBtns = {
            undo: document.getElementById('btn-undo'),
            redo: document.getElementById('btn-redo')
        };

        let currentMode = 'nav';
        let history = [];
        let historyIndex = -1;
        let isHandlingHistory = false;

        const canvas = new fabric.Canvas('markup-canvas', {
            isDrawingMode: false,
            selection: false
        });

        canvas.freeDrawingBrush.color = '#ef4444';
        canvas.freeDrawingBrush.width = 4;

        const updateCanvasSize = () => {
            try {
                const doc = frame.contentDocument || frame.contentWindow.document;
                const height = Math.max(doc.body.scrollHeight, doc.documentElement.scrollHeight, window.innerHeight);
                canvas.setDimensions({ width: window.innerWidth, height: height });
            } catch (e) {
                canvas.setDimensions({ width: window.innerWidth, height: 5000 });
            }
        };

        const setMode = (mode) => {
            currentMode = mode;
            document.body.classList.toggle('drawing-active', mode !== 'nav');
            canvas.isDrawingMode = (mode === 'draw');
            canvas.selection = (mode === 'select');
            
            canvas.forEachObject(obj => {
                obj.selectable = (mode === 'select' || mode === 'text');
                obj.evented = (mode === 'select' || mode === 'text');
            });

            Object.keys(tools).forEach(key => {
                tools[key].classList.toggle('tool-btn-active', key === mode);
                if (key !== mode) tools[key].classList.add('text-gray-500');
                else tools[key].classList.remove('text-gray-500');
            });

            modeText.innerText = mode.charAt(0).toUpperCase() + mode.slice(1);
        };

        // History Management
        const saveState = () => {
            if (isHandlingHistory) return;
            
            const state = JSON.stringify(canvas);
            
            // Remove any "redo" states if we've made a new change
            if (historyIndex < history.length - 1) {
                history = history.slice(0, historyIndex + 1);
            }
            
            history.push(state);
            historyIndex++;
            
            // Limit history to 50 states
            if (history.length > 50) {
                history.shift();
                historyIndex--;
            }
            
            updateHistoryButtons();
            localStorage.setItem('eef_markup_final', state);
        };

        const updateHistoryButtons = () => {
            historyBtns.undo.disabled = historyIndex <= 0;
            historyBtns.redo.disabled = historyIndex >= history.length - 1;
        };

        const undo = () => {
            if (historyIndex > 0) {
                isHandlingHistory = true;
                historyIndex--;
                canvas.loadFromJSON(history[historyIndex], () => {
                    canvas.renderAll();
                    isHandlingHistory = false;
                    updateHistoryButtons();
                    localStorage.setItem('eef_markup_final', history[historyIndex]);
                });
            }
        };

        const redo = () => {
            if (historyIndex < history.length - 1) {
                isHandlingHistory = true;
                historyIndex++;
                canvas.loadFromJSON(history[historyIndex], () => {
                    canvas.renderAll();
                    isHandlingHistory = false;
                    updateHistoryButtons();
                    localStorage.setItem('eef_markup_final', history[historyIndex]);
                });
            }
        };

        // Tool Event Listeners
        tools.nav.onclick = () => setMode('nav');
        tools.draw.onclick = () => setMode('draw');
        tools.text.onclick = () => setMode('text');
        tools.select.onclick = () => setMode('select');
        
        historyBtns.undo.onclick = undo;
        historyBtns.redo.onclick = redo;

        // Keyboard Shortcuts
        window.addEventListener('keydown', (e) => {
            if (e.ctrlKey || e.metaKey) {
                if (e.key === 'z') undo();
                if (e.key === 'y') redo();
            }
            if (e.key === 'Delete' || e.key === 'Backspace') {
                const activeObjects = canvas.getActiveObjects();
                if (activeObjects.length) {
                    canvas.discardActiveObject();
                    canvas.remove(...activeObjects);
                    saveState();
                }
            }
        });

        // Handle Text Addition
        canvas.on('mouse:down', (options) => {
            if (currentMode === 'text' && !options.target) {
                const pointer = canvas.getPointer(options.e);
                const text = new fabric.IText('Type here...', {
                    left: pointer.x,
                    top: pointer.y,
                    fontFamily: 'Plus Jakarta Sans',
                    fontSize: 20,
                    fill: '#ef4444',
                    fontWeight: 'bold',
                    backgroundColor: 'rgba(255,255,255,0.8)'
                });
                canvas.add(text);
                canvas.setActiveObject(text);
                text.enterEditing();
                saveState();
            }
        });

        const loadMarkup = () => {
            const data = localStorage.getItem('eef_markup_final');
            if (data) {
                canvas.loadFromJSON(data, () => {
                    canvas.renderAll();
                    // Initialize history with loaded state
                    history = [data];
                    historyIndex = 0;
                    updateHistoryButtons();
                });
            } else {
                // Initialize history with empty state
                saveState();
            }
        };

        canvas.on('path:created', saveState);
        canvas.on('object:modified', saveState);
        canvas.on('text:changed', saveState);

        document.getElementById('btn-clear').addEventListener('click', () => {
            if(confirm('Clear all markups?')) {
                canvas.clear();
                localStorage.removeItem('eef_markup_final');
                history = [];
                historyIndex = -1;
                saveState();
            }
        });

        frame.onload = () => {
            updateCanvasSize();
            loadMarkup();
            frame.contentWindow.onscroll = () => {
                const scrollTop = frame.contentWindow.pageYOffset;
                wrapper.style.top = `-${scrollTop}px`;
            };
        };

        window.onresize = updateCanvasSize;
    </script>
</body>
</html>
