<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DESIGN REVIEW | Easy Email Flow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200..800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1000;
            pointer-events: none;
        }
        canvas {
            pointer-events: auto;
        }
        .drawing-mode #canvas-container {
            pointer-events: auto;
        }
        .toolbar {
            transition: all 0.3s cubic-bezier(0.32, 0.72, 0, 1);
        }
        iframe {
            width: 100vw;
            height: 100vh;
            border: none;
        }
    </style>
</head>
<body class="bg-gray-100 overflow-hidden">
    <!-- Overlay UI -->
    <div class="fixed top-6 left-1/2 -translate-x-1/2 z-[2000] flex items-center gap-4 bg-white/80 backdrop-blur-xl p-2 rounded-full shadow-2xl border border-black/5 toolbar">
        <div class="px-4 py-2 border-r border-black/5">
            <span class="text-[10px] font-bold uppercase tracking-widest text-brand-teal">Feedback Mode</span>
        </div>
        
        <button id="btn-draw" class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-gray-100 transition-colors bg-brand-dark text-white shadow-lg" title="Pencil">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
        </button>

        <button id="btn-clear" class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-red-50 text-red-500 transition-colors" title="Clear All">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
        </button>

        <a href="index.html" class="px-6 py-2 bg-gray-900 text-white rounded-full text-xs font-bold hover:scale-105 transition-transform">Done</a>
    </div>

    <!-- The Site in the Background -->
    <iframe id="preview-frame" src="index.html"></iframe>

    <!-- Drawing Canvas Overlay -->
    <div id="canvas-container">
        <canvas id="markup-canvas"></canvas>
    </div>

    <script>
        const canvas = new fabric.Canvas('markup-canvas', {
            isDrawingMode: true,
            width: window.innerWidth,
            height: window.innerHeight
        });

        // Set pencil style
        canvas.freeDrawingBrush.color = '#ef4444'; // Red for visibility
        canvas.freeDrawingBrush.width = 4;

        // Auto-save logic
        const saveMarkup = () => {
            const data = JSON.stringify(canvas);
            localStorage.setItem('eef_markup', data);
        };

        const loadMarkup = () => {
            const data = localStorage.getItem('eef_markup');
            if (data) {
                canvas.loadFromJSON(data);
            }
        };

        canvas.on('path:created', saveMarkup);
        canvas.on('object:modified', saveMarkup);
        canvas.on('object:removed', saveMarkup);

        // Handle Resizing
        window.addEventListener('resize', () => {
            canvas.setWidth(window.innerWidth);
            canvas.setHeight(window.innerHeight);
            canvas.renderAll();
        });

        // UI Actions
        document.getElementById('btn-clear').addEventListener('click', () => {
            if(confirm('Clear all markups?')) {
                canvas.clear();
                localStorage.removeItem('eef_markup');
            }
        });

        // Load existing work
        window.addEventListener('load', loadMarkup);

        console.log("Markup Mode Active. Use the red pencil to draw your edits.");
    </script>
</body>
</html>
